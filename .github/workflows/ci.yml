name: CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  checks: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java-version: [11, 25]
    steps:
    - uses: actions/checkout@v7
    - name: Set up Java
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '${{ matrix.java-version }}'
        cache: maven
    - name: Build Endive
      run: |
        git clone --depth 1 https://github.com/bytecodealliance/endive.git /tmp/endive
        cd /tmp/endive
        mvn -B -Dquickly install
    - name: Build and test
      run: mvn -B install
    - name: Publish Test Report
      uses: mikepenz/action-junit-report@v6
      if: success() || failure()
      with:
        report_paths: '**/target/surefire-reports/TEST-*.xml'

  test-results:
    name: Test Results
    permissions:
      contents: write
      checks: write
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout sources
        uses: actions/checkout@v7
      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: maven
      - name: Build Endive
        run: |
          git clone --depth 1 https://github.com/bytecodealliance/endive.git /tmp/endive
          cd /tmp/endive
          mvn -B -Dquickly install
      - name: Build and test
        run: mvn -B install
      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@d0a4676d0e0b938bc201470d88276b7c74c712b3
        id: test-results
        with:
          check_name: Tests Results
          comment_mode: off
          compare_to_earlier_commit: false
          files: '**/surefire-reports/*.xml'
      - name: Publish badge conditional
        id: publish
        if: |
          (github.event_name == 'workflow_run' && github.event.workflow_run.head_branch == 'main' ||
            github.event_name != 'workflow_run' && github.ref == 'refs/heads/main')
        run: echo "badge=true" >> $GITHUB_OUTPUT
      - name: Set badge color
        shell: bash
        if: steps.publish.outputs.badge
        run: |
          case ${{ fromJSON( steps.test-results.outputs.json ).conclusion }} in
            success)
              echo "BADGE_COLOR=31c653" >> $GITHUB_ENV
              ;;
            failure)
              echo "BADGE_COLOR=800000" >> $GITHUB_ENV
              ;;
            neutral)
              echo "BADGE_COLOR=696969" >> $GITHUB_ENV
              ;;
          esac
      - name: Create badge
        uses: emibcn/badge-action@f9150fde070fcca0c4e832437611b44838fcd325
        if: steps.publish.outputs.badge
        with:
          label: 'Tests'
          status: '${{ fromJSON( steps.test-results.outputs.json ).stats.tests_succ }} success, ${{ fromJSON( steps.test-results.outputs.json ).stats.tests_skip }} skip, ${{ fromJSON( steps.test-results.outputs.json ).stats.tests_fail }} failures, ${{ fromJSON( steps.test-results.outputs.json ).stats.tests_error }} errors, ${{ fromJSON( steps.test-results.outputs.json ).stats.tests }} total'
          color: ${{ env.BADGE_COLOR }}
          path: badge-tests.svg
      - name: Upload badge to GH Action
        uses: actions/upload-artifact@v7
        with:
          name: badge-tests
          path: badge-tests.svg
      - name: Checkout badges branch
        if: steps.publish.outputs.badge
        uses: actions/checkout@v7
        with:
          ref: badges
          path: badges
      - name: Upload badge to badges branch
        if: steps.publish.outputs.badge
        run: |
          cd badges
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp ../badge-tests.svg .
          git add badge-tests.svg
          git commit -m "Update tests badge" || exit 0
          git push -f
